version: '3.9'

services:
  postgres:
    image: postgres:17.4
    container_name: db_e_commerce_hm_product
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product
    ports:
      - "5556:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data